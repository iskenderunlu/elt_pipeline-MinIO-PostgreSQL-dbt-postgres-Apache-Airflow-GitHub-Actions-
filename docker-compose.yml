version: '3.8'

x-airflow-common: &airflow-common
  build: .
  image: elt_pipeline-airflow:latest
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'elt-pipeline-secret-key-change-in-prod'
    # MinIO / S3 credentials (used by Airflow)
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_DEFAULT_REGION: us-east-1
    # Data warehouse (PostgreSQL) connection
    DWH_HOST: postgres-dwh
    DWH_PORT: '5432'
    DWH_DB: dwh
    DWH_USER: dwh
    DWH_PASSWORD: dwh
    # MinIO endpoint
    MINIO_ENDPOINT: http://minio:9000
    MINIO_BUCKET: elt-pipeline-raw
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./extract:/opt/airflow/extract
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - elt-net

services:

  # ── 1. PostgreSQL — Airflow metadata DB ────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - elt-net

  # ── 2. PostgreSQL — Data Warehouse (instead of Snowflake) ──────────────────────
  postgres-dwh:
    image: postgres:15
    environment:
      POSTGRES_USER: dwh
      POSTGRES_PASSWORD: dwh
      POSTGRES_DB: dwh
    volumes:
      - postgres-dwh-data:/var/lib/postgresql/data
      - ./scripts/init_dwh.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"          # if you want to connect from your host: psql -h localhost -p 5433 -U dwh -d dwh
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dwh"]
      interval: 10s
      retries: 5
    networks:
      - elt-net

  # ── 3. MinIO — instead of AWS S3 ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API  → http://localhost:9000
      - "9001:9001"   # Web UI  → http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
    networks:
      - elt-net

  # It creates automatically MinIO bucket 
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/elt-pipeline-raw &&
        mc mb --ignore-existing local/elt-pipeline-processed &&
        echo 'Buckets ready.'
      "
    networks:
      - elt-net

  # ── 4. Airflow init ────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com &&
        echo "Airflow initialized."
    restart: "no"

  # ── 5. Airflow webserver ───────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"   # → http://localhost:8080  (admin/admin)
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── 6. Airflow scheduler ───────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-airflow-data:
  postgres-dwh-data:
  minio-data:
  airflow-logs:

networks:
  elt-net:
    driver: bridge
