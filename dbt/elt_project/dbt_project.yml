name: 'elt_project'
version: '1.0.0'
config-version: 2

profile: 'elt_project'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  elt_project:
    staging:
      +materialized: view        # staging → view (every query fresh data)
      +schema: staging
    marts:
      +materialized: table       # marts → table (analytical queries are fast)
      +schema: marts
