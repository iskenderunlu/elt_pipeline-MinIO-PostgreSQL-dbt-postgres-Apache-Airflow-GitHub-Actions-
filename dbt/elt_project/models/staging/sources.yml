version: 2

sources:
  - name: raw
    schema: raw
    description: "MinIO'dan yüklenen ham veriler"
    tables:

      - name: orders
        description: "Ham sipariş kayıtları (tip dönüşümü yapılmamış)"
        columns:
          - name: order_id
            description: "Sipariş ID — benzersiz olmalı"
          - name: customer_id
          - name: order_date
          - name: status
          - name: amount
          - name: product_id
          - name: quantity

      - name: customers
        description: "Müşteri kayıtları"
        columns:
          - name: customer_id
            description: "Müşteri ID"

      - name: products
        description: "Ürün kataloğu"
        columns:
          - name: product_id
