version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw Data loaded from MinIO"
    tables:

      - name: orders
        description: "Raw order records (without type conversion)"
        columns:
          - name: order_id
            description: "Order ID — it must be unique"
          - name: customer_id
          - name: order_date
          - name: status
          - name: amount
          - name: product_id
          - name: quantity

      - name: customers
        description: "Customer Records"
        columns:
          - name: customer_id
            description: "Müşteri ID"

      - name: products
        description: "Product Catalogue"
        columns:
          - name: product_id
